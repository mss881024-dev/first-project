<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>취소표 모니터링 대시보드 — BigBang 2026 고양</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --warn: #f59e0b;
    --danger: #ef4444;
    --success: #22c55e;
    --text: #e8eaf6;
    --text2: #9094b0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
  .subtitle { color: var(--text2); font-size: 12px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .badge-review { background: var(--warn); color: #000; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700; cursor: pointer; display: none; }
  .badge-review.show { display: inline-block; }

  /* ── Layout ── */
  .main { max-width: 1200px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 20px; }

  /* ── Summary Cards ── */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
  }
  .stat-num { font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-label { color: var(--text2); font-size: 12px; margin-top: 4px; }
  .c-wait { color: var(--warn); }
  .c-open { color: var(--success); }
  .c-pend { color: var(--accent); }
  .c-total { color: var(--text2); }

  /* ── Bar chart ── */
  .section-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .section-chart h3 { font-size: 13px; color: var(--text2); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 13px; }
  .bar-label { width: 70px; text-align: right; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; background: var(--surface2); border-radius: 4px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--warn); border-radius: 4px; transition: width .4s; }
  .bar-count { width: 28px; color: var(--text2); font-size: 12px; }
  .no-bar { color: var(--text2); font-size: 13px; }

  /* ── Input Panel ── */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .input-panel h2 { font-size: 15px; margin-bottom: 14px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.show { display: block; }
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font-size: 13px;
    resize: vertical;
    min-height: 120px;
    font-family: inherit;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    color: var(--text2);
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); color: var(--accent); }
  .drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone-icon { font-size: 28px; margin-bottom: 8px; }
  .file-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
  .file-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .file-chip button { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 14px; padding: 0; }
  .submit-row { margin-top: 12px; display: flex; align-items: center; gap: 10px; }
  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .parse-status { font-size: 13px; color: var(--text2); }
  .parse-status.ok { color: var(--success); }
  .parse-status.err { color: var(--danger); }

  /* ── Filter Bar ── */
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text2);
    padding: 5px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.12); }
  .filter-search {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 6px 12px;
    font-size: 13px;
    outline: none;
    width: 200px;
  }
  .filter-search:focus { border-color: var(--accent); }

  /* ── Table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .8px;
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,.03); }
  td { padding: 10px 14px; vertical-align: middle; font-size: 13px; }
  .td-section { font-weight: 700; color: var(--accent2); }
  .td-seat { color: var(--text2); }
  .td-date { color: var(--text2); font-size: 12px; }
  .td-raw { color: var(--text2); font-size: 12px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-badge {
    display: inline-flex; align-items: center;
    border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 700;
    white-space: nowrap;
  }
  .s-wait   { background: rgba(245,158,11,.15); color: var(--warn); border: 1px solid rgba(245,158,11,.3); }
  .s-open   { background: rgba(34,197,94,.15);  color: var(--success); border: 1px solid rgba(34,197,94,.3); }
  .s-pend   { background: rgba(108,99,255,.15); color: var(--accent); border: 1px solid rgba(108,99,255,.3); }
  .count-badge { display: inline-block; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text2); }
  .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; opacity: .5; transition: opacity .15s; font-size: 16px; padding: 0 4px; }
  .btn-del:hover { opacity: 1; }
  .empty-row td { text-align: center; color: var(--text2); padding: 40px; }

  /* ── Review Drawer ── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: none; }
  .drawer-overlay.open { display: flex; justify-content: flex-end; }
  .drawer {
    background: var(--surface);
    width: min(460px, 100vw);
    height: 100%;
    overflow-y: auto;
    padding: 24px;
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 14px;
  }
  .drawer h2 { font-size: 16px; }
  .review-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .review-raw { font-size: 13px; }
  .review-reason { font-size: 11px; color: var(--text2); }
  .review-footer { display: flex; align-items: center; gap: 8px; }
  .review-time { font-size: 11px; color: var(--text2); flex: 1; }
  .btn-dismiss { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); padding: 4px 12px; font-size: 12px; cursor: pointer; }
  .btn-dismiss:hover { border-color: var(--danger); color: var(--danger); }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 22px; font-size: 13px; color: var(--text);
    transition: opacity .3s; opacity: 0; pointer-events: none; z-index: 300;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">🎫 취소표 대시보드</div>
    <div class="subtitle">BigBang 2026 · 고양종합운동장 · 수동 입력 전용</div>
  </div>
  <div class="header-right">
    <span class="badge-review" id="badgeReview" onclick="openDrawer()">확인 필요 <span id="reviewCount">0</span></span>
  </div>
</header>

<div class="main">

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num c-wait" id="s-wait">0</div><div class="stat-label">대기 중 (취소됨)</div></div>
    <div class="stat-card"><div class="stat-num c-open" id="s-open">0</div><div class="stat-label">재오픈됨</div></div>
    <div class="stat-card"><div class="stat-num c-pend" id="s-pend">0</div><div class="stat-label">확인 필요</div></div>
    <div class="stat-card"><div class="stat-num c-total" id="s-total">0</div><div class="stat-label">전체</div></div>
  </div>

  <!-- Section Bar Chart -->
  <div class="section-chart">
    <h3>구역별 대기 중 취소표</h3>
    <div id="barChart"><span class="no-bar">데이터 없음</span></div>
  </div>

  <!-- Input Panel -->
  <div class="input-panel">
    <h2>카톡 내용 추가</h2>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('text',this)">텍스트 붙여넣기</button>
      <button class="tab-btn" onclick="switchTab('image',this)">이미지 업로드</button>
    </div>

    <div class="tab-content show" id="tab-text">
      <textarea id="chatInput" placeholder="카카오톡 PC버전에서 복사한 대화를 여기에 붙여넣으세요.&#10;(여러 줄, 여러 사람 메시지 한 번에 가능)"></textarea>
    </div>

    <div class="tab-content" id="tab-image">
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple accept="image/png,image/jpeg,image/webp" onchange="handleFiles(this.files)"/>
        <div class="drop-zone-icon">📷</div>
        <div>PNG / JPG / WEBP 스크린샷을 여기 놓거나 클릭해서 선택</div>
      </div>
      <div class="file-list" id="fileList"></div>
    </div>

    <div class="submit-row">
      <button class="btn-primary" id="submitBtn" onclick="submitInput()">추가하기</button>
      <span class="parse-status" id="parseStatus"></span>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">전체</button>
    <button class="filter-btn" data-filter="취소됨" onclick="setFilter('취소됨',this)">대기 중</button>
    <button class="filter-btn" data-filter="재오픈됨" onclick="setFilter('재오픈됨',this)">재오픈됨</button>
    <button class="filter-btn" data-filter="확인필요" onclick="setFilter('확인필요',this)">확인 필요</button>
    <select id="dateFilter" class="filter-btn" style="cursor:pointer" onchange="renderTable()">
      <option value="all">모든 날짜</option>
      <option value="8/21">8/21</option>
      <option value="8/22">8/22</option>
      <option value="8/23">8/23</option>
    </select>
    <input class="filter-search" type="text" id="searchInput" placeholder="구역/좌석 검색…" oninput="renderTable()"/>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>최종 업데이트</th>
          <th>구역</th>
          <th>좌석</th>
          <th>공연일</th>
          <th>상태</th>
          <th>보고</th>
          <th>원문 일부</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<!-- Review Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawerIfBg(event)">
  <div class="drawer">
    <h2>확인 필요 항목</h2>
    <div id="reviewList"><span style="color:var(--text2)">항목 없음</span></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
let allTickets = [];
let selectedFiles = [];
let currentFilter = 'all';

// ── Helpers ──────────────────────────────────────────────────────────
function toast(msg, dur=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function fmt(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ── Tab switching ─────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('show'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('show');
}

// ── File handling ─────────────────────────────────────────────────────
function handleFiles(files) {
  for (const f of files) {
    if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) {
      selectedFiles.push(f);
    }
  }
  renderFileChips();
}

function renderFileChips() {
  const list = document.getElementById('fileList');
  list.innerHTML = selectedFiles.map((f, i) =>
    `<div class="file-chip">${f.name} <button onclick="removeFile(${i})">✕</button></div>`
  ).join('');
}

function removeFile(i) {
  selectedFiles.splice(i, 1);
  renderFileChips();
}

// Drag & Drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});

// ── Submit ────────────────────────────────────────────────────────────
async function submitInput() {
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('parseStatus');
  const isText = document.getElementById('tab-text').classList.contains('show');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  status.className = 'parse-status';
  status.textContent = '처리 중…';

  try {
    let result;
    if (isText) {
      const text = document.getElementById('chatInput').value.trim();
      if (!text) { toast('텍스트를 입력해 주세요.'); return; }
      const res = await fetch('/api/parse-text', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({text})
      });
      if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
      result = await res.json();
      document.getElementById('chatInput').value = '';
    } else {
      if (!selectedFiles.length) { toast('이미지를 먼저 선택해 주세요.'); return; }
      let saved = 0, review = 0;
      for (const f of selectedFiles) {
        const fd = new FormData();
        fd.append('file', f);
        const res = await fetch('/api/parse-image', { method: 'POST', body: fd });
        if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
        const r = await res.json();
        saved += r.saved; review += r.review;
      }
      result = { saved, review };
      selectedFiles = [];
      renderFileChips();
    }
    status.className = 'parse-status ok';
    status.textContent = `✓ ${result.saved}건 추가됨${result.review ? ` / 확인필요 ${result.review}건` : ''}`;
    await refresh();
  } catch(e) {
    status.className = 'parse-status err';
    status.textContent = `오류: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '추가하기';
  }
}

// ── Filter & Render ───────────────────────────────────────────────────
function setFilter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const search     = document.getElementById('searchInput').value.toLowerCase();
  const dateFilter = document.getElementById('dateFilter').value;

  let rows = allTickets.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false;
    if (dateFilter !== 'all' && t.concert_date !== dateFilter) return false;
    if (search) {
      const haystack = `${t.section||''} ${t.seat||''} ${t.raw_text||''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="8">표시할 항목이 없습니다.</td></tr>';
    return;
  }

  const statusClass = { '취소됨':'s-wait', '재오픈됨':'s-open', '확인필요':'s-pend' };
  const statusLabel = { '취소됨':'대기 중', '재오픈됨':'재오픈됨', '확인필요':'확인 필요' };

  tbody.innerHTML = rows.map(t => `
    <tr>
      <td>${fmt(t.last_updated)}</td>
      <td class="td-section">${t.section || '-'}</td>
      <td class="td-seat">${t.seat || '-'}</td>
      <td class="td-date">${t.concert_date || '-'}</td>
      <td><span class="status-badge ${statusClass[t.status]||'s-pend'}">${statusLabel[t.status]||t.status}</span></td>
      <td><span class="count-badge">${t.report_count}회</span></td>
      <td class="td-raw" title="${(t.raw_text||'').replace(/"/g,'&quot;')}">${t.raw_text || '-'}</td>
      <td><button class="btn-del" onclick="delTicket('${t.id}')" title="삭제">✕</button></td>
    </tr>
  `).join('');
}

// ── Stats & Chart ─────────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/stats');
  const s = await r.json();
  document.getElementById('s-wait').textContent  = s.waiting;
  document.getElementById('s-open').textContent  = s.reopened;
  document.getElementById('s-pend').textContent  = s.pending;
  document.getElementById('s-total').textContent = s.total;

  const chart = document.getElementById('barChart');
  const entries = Object.entries(s.section_counts || {}).sort((a,b) => b[1]-a[1]).slice(0,10);
  if (!entries.length) { chart.innerHTML = '<span class="no-bar">대기 중 구역 데이터 없음</span>'; return; }
  const max = entries[0][1];
  chart.innerHTML = entries.map(([sec, cnt]) => `
    <div class="bar-row">
      <span class="bar-label">${sec}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/max*100)}%"></div></div>
      <span class="bar-count">${cnt}</span>
    </div>
  `).join('');
}

// ── Review Drawer ─────────────────────────────────────────────────────
async function loadReview() {
  const r    = await fetch('/api/review');
  const list = await r.json();
  const badge = document.getElementById('badgeReview');
  document.getElementById('reviewCount').textContent = list.length;
  badge.classList.toggle('show', list.length > 0);

  const el = document.getElementById('reviewList');
  if (!list.length) { el.innerHTML = '<span style="color:var(--text2)">항목 없음</span>'; return; }
  el.innerHTML = list.map(item => `
    <div class="review-item" id="rv-${item.id}">
      <div class="review-raw">${item.raw_text}</div>
      <div class="review-reason">⚠️ ${item.reason}</div>
      <div class="review-footer">
        <span class="review-time">${fmt(item.added_at)}</span>
        <button class="btn-dismiss" onclick="dismissReview(${item.id})">확인 완료</button>
      </div>
    </div>
  `).join('');
}

function openDrawer() { document.getElementById('drawerOverlay').classList.add('open'); loadReview(); }
function closeDrawerIfBg(e) {
  if (e.target === document.getElementById('drawerOverlay'))
    document.getElementById('drawerOverlay').classList.remove('open');
}

async function dismissReview(id) {
  await fetch(`/api/review/${id}`, { method: 'DELETE' });
  document.getElementById(`rv-${id}`)?.remove();
  await loadReview();
}

// ── Delete Ticket ─────────────────────────────────────────────────────
async function delTicket(id) {
  if (!confirm('이 항목을 삭제할까요?')) return;
  await fetch(`/api/tickets/${id}`, { method: 'DELETE' });
  toast('삭제됐습니다.');
  await refresh();
}

// ── Refresh all ──────────────────────────────────────────────────────
async function refresh() {
  const [tr, _] = await Promise.all([fetch('/api/tickets'), loadStats()]);
  allTickets = await tr.json();
  renderTable();
  await loadReview();
}

// ── Init ──────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
